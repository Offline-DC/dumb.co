name: Build desktop sign-in app

# Builds the Tauri "Dumb Down — Google sign-in" helper for macOS + Windows and
# publishes the installers to a GitHub Release on this repo. The /desktop page
# (src/Desktop/DesktopDownload.tsx) fetches the latest release's .dmg / .exe.
#
# Run it from the Actions tab (workflow_dispatch), or by pushing a tag like
# desktop-v0.1.0.

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    permissions:
      contents: write # tauri-action creates the Release + uploads assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-signin/src-tauri

      - name: Install frontend deps
        working-directory: desktop-signin
        run: npm install

      - name: Build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Code signing (optional). Add these as repo secrets to ship
          # --- signed builds; without them the apps still build but show
          # --- Gatekeeper / SmartScreen warnings. Uncomment when ready.
          #
          # macOS (Developer ID + notarization):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}              # base64 of the .p12
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}    # "Developer ID Application: Name (TEAMID)"
          # APPLE_ID: ${{ secrets.APPLE_ID }}                               # your Apple ID email
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}                   # app-specific password
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          #
          # Windows (Azure Trusted Signing — cheapest, no hardware token):
          # AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          # AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # (also fill bundle.windows.trustedSigning in tauri.conf.json)
        with:
          projectPath: desktop-signin
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'desktop-latest' }}
          releaseName: "Dumb Down — Google sign-in"
          releaseBody: "Sign into Google on your computer and scan the QR with the Dumb Down app on your phone."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
